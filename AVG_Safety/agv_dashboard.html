<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AGV 안전 모니터링 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #222; color: white; padding: 50px; }
        #statusBox { width: 300px; height: 300px; margin: 30px auto; border-radius: 20px; background-color: #555; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; transition: background-color 0.3s; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; background-color: #007bff; color: white; }
        button:hover { background-color: #0056b3; }
        .state-0 { background-color: #28a745 !important; } /* 초록 */
        .state-1 { background-color: #dc3545 !important; animation: blink 1s infinite; } /* 빨강 깜빡임 */
        .state-2 { background-color: #fd7e14 !important; } /* 주황 */
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <h1>AGV 실시간 상태 모니터링</h1>
    <button id="connectBtn">아두이노 연결하기</button>
    <div id="statusBox">대기 중...</div>

    <script>
        let port;
        const connectBtn = document.getElementById('connectBtn');
        const statusBox = document.getElementById('statusBox');

        connectBtn.addEventListener('click', async () => {
            try {
                // 아두이노 포트 선택 창 띄우기
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                connectBtn.innerText = "연결됨!";
                connectBtn.style.backgroundColor = "#28a745";
                
                // 데이터 읽기 설정
                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                let buffer = "";

                // 무한 루프로 데이터 읽기
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // 완전하지 않은 마지막 줄은 버퍼에 남김

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith("STATUS:")) {
                            let state = line.split(":")[1];
                            updateDashboard(state);
                        }
                    }
                }
            } catch (err) {
                console.error('연결 에러:', err);
                alert("연결에 실패했거나 취소되었습니다.");
            }
        });

        function updateDashboard(state) {
            statusBox.className = ""; // 기존 클래스 초기화
            if (state === "0") {
                statusBox.classList.add("state-0");
                statusBox.innerText = "정상 가동 중";
            } else if (state === "1") {
                statusBox.classList.add("state-1");
                statusBox.innerText = "비상 정지!";
            } else if (state === "2") {
                statusBox.classList.add("state-2");
                statusBox.innerText = "복구 대기 중\n(엔코더 회전 필요)";
            }
        }
    </script>
</body>
</html>
